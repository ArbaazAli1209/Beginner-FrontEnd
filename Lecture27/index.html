<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            width: 100vw;
            height: 100vh;
            background-color: #8BC6EC;
            background-image: linear-gradient(135deg, #8BC6EC 0%, #9599E2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            width: 360px;
            height: 600px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 20px;
        }
        .card img {
            height: 60%;
            border-radius: 10px;
        }
        .card h1{
            font-size: 24px;
            text-align: center;
        }
        .card p{
            font-size: 1.2em;
            text-align: center;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="card">
            <img src="qrcode.png" id="qrCode">
            <h1>Improve your front end skills by developing projects</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Obcaecati praesentium quaerat porro.</p>
        </div>
    </div>

</body>
</html>
