<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Card</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 100vw;
            height: 100vh;
            background-color: #8BC6EC;
            background-image: linear-gradient(135deg, #8BC6EC 0%, #9599E2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 400px;
            height: 600px;
            background-color: pink;
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .card img {
            width: 100%;
            height: 30%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        #textBox {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 75%;
            text-align: center;
        }

        .amountBox {
            width: 85%;
            height: 10%;
            background-color: aquamarine;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 20px;
            padding-left: 20px;
        }

        #leftBox {
            height: 100%;
            width: fit-content;
            gap: 15px;
            display: flex;
            align-items: center;
        }

        #imgBox img {
            width: 3rem;
            height: 3rem;
        }

        #rightBox {
            font-weight: bold;
        }

        #paymentButton {
            width: 85%;
            height: 9%;
            background-color: rgb(19, 19, 66);
            color: white;
            border-radius: 10px;
            box-shadow: 0 19px 38px rgba(0,0,0,0.30), 0 15px 12px rgba(0,0,0,0.22);
        }

        .cancelBox a {
            text-decoration: none;
            color: rgb(32, 31, 31);
            font-weight: bold;
            font-size: large;
        }

    </style>
</head>
<body>
    
    <div class="container">
        <div class="card">
            <img src="box.jpg" id="box"/>

            <div id="textbox">
                <h1>Order Summary</h1>

                <p>
                    Lorem ipsum dolor sit amet consectetur, adipisicing elit. Blanditiis 
                    perspiciatis eius asperiores ducimus maiores beatae praesentium corrupti 
                    nisi ea voluptates!
                </p>
            </div>

            <div class="amountBox">

                <div id="leftBox">

                    <div id="imgBox">
                        <img src="musicLogo.jpg"/>
                    </div>

                    <div id="textAmountBox">
                        <p>Amount:</p>
                        <p>$99.99/year</p>
                    </div>

                </div>

                <div id="rightBox">
                    <a href="#">Change</a>
                </div>

            </div>

            <button id="paymentButton">Proceed to payment</button>

            <div class="cancelBox">
                <a href="#">Cancel Order</a>
            </div>

        </div>
    </div>

</body>
</html>
