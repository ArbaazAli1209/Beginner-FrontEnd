<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D Transforms</title>
</head>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        width: 100%;
        height: 100%;
    }
    .container {
        width: 100%;
        height: 100%;
        padding: 4rem;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
    }
    .items {
        padding: 2rem;
        width: 150px;
        height: 150px;
        border: 2px solid black;
        background-color: rgb(95, 200, 49);
    }
    #rotateX:hover{
        transform: rotateX(45deg);
    }
    #rotateY:hover{
        transform: rotateY(-45deg);
    }
    #rotateZ:hover{
        transform: rotatez(45deg);
    }
    #translatex:hover{
        transform: translateX(100px);
    }
    #translatey:hover{
        transform: translateY(-100px);
    }#translatez:hover{
        transform: perspective(300px) translateZ(100px);
    }
    #scalex:hover{
        transform: scaleX(1.5);
    }
    #scaley:hover{
        transform: scaleY(1.5);
    }
    #scalez:hover{
        transform: perspective(300px) scaleZ(5) rotateY(30deg);
    }
</style>

<body>
    
    <div class="container">
        <div class="items" id="rotateX">RotateX</div>
        <div class="items" id="rotateY">RotateY</div>
        <div class="items" id="rotateZ">RotateZ</div>
        <div class="items" id="translatex">TranslateX</div>
        <div class="items" id="translatey">TranslateY</div>
        <div class="items" id="translatez">TranslateZ</div>
        <div class="items" id="scalex">ScaleX</div>
        <div class="items" id="scaley">ScaleY</div>
        <div class="items" id="scalez">ScaleZ</div>
    </div>

</body>
</html>
